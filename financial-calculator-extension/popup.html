<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Note Taker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <main class="popup-app">
      <header class="popup-header">
        <div>
          <p class="eyebrow">Auto Note Taker</p>
          <h1>Saved Notes</h1>
        </div>
        <button id="authButton" class="auth-button">Login with Google</button>
      </header>

      <section class="toolbar">
        <input id="searchInput" type="search" placeholder="Search notes or URLs" aria-label="Search notes" />
      </section>

      <section class="status-card" id="statusCard">
        <p id="statusText">Local notes are ready. Sign in to sync with Supabase.</p>
      </section>

      <section id="notesContainer" class="notes-container" aria-live="polite"></section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
