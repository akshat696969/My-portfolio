<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Calculator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body data-theme="light">
    <main class="app">
      <div class="top-bar">
        <div>
          <h1>Financial Calculator</h1>
          <p class="subtitle">Quick tools for budgeting and planning.</p>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" title="Switch theme">
          <span class="theme-icon theme-icon--sun" aria-hidden="true">☀️</span>
          <span class="theme-icon theme-icon--moon" aria-hidden="true">🌙</span>
        </button>
      </div>

      <div class="settings-grid">
        <div>
          <label for="calculatorType">Calculator</label>
          <select id="calculatorType">
            <option value="emi">Loan EMI</option>
            <option value="sip">SIP Future Value</option>
            <option value="retirement">Retirement Corpus</option>
            <option value="fd">Fixed Deposit Maturity</option>
            <option value="lumpsum">Lumpsum Future Value</option>
            <option value="inflation">Inflation Impact</option>
            <option value="budget">50/30/20 Budget Split</option>
            <option value="dti">Debt-to-Income (DTI)</option>
            <option value="emergency">Emergency Fund Target</option>
            <option value="savingsGoal">Savings Goal Planner</option>
          </select>
        </div>

        <div>
          <label for="currencyType">Currency</label>
          <select id="currencyType">
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="INR">INR (₹)</option>
            <option value="GBP">GBP (£)</option>
            <option value="JPY">JPY (¥)</option>
          </select>
        </div>
      </div>

      <form id="calculatorForm" novalidate>
        <div class="field-group" data-calc="emi sip retirement fd lumpsum inflation">
          <label for="principal">Amount</label>
          <input id="principal" name="principal" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="emi retirement fd lumpsum inflation savingsGoal">
          <label for="annualRate">Annual Rate (%)</label>
          <input id="annualRate" name="annualRate" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="sip">
          <label for="sipRate">Expected Annual Return (%)</label>
          <input id="sipRate" name="sipRate" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="emi">
          <label for="loanYears">Loan Term (years)</label>
          <input id="loanYears" name="loanYears" type="number" min="1" step="1" required />
        </div>

        <div class="field-group" data-calc="sip">
          <label for="sipYears">Investment Duration (years)</label>
          <input id="sipYears" name="sipYears" type="number" min="1" step="1" required />
        </div>

        <div class="field-group" data-calc="retirement fd lumpsum inflation">
          <label for="years">Duration (years)</label>
          <input id="years" name="years" type="number" min="1" step="1" required />
        </div>

        <div class="field-group" data-calc="budget dti savingsGoal">
          <label for="monthlyIncome">Monthly Income</label>
          <input id="monthlyIncome" name="monthlyIncome" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="dti">
          <label for="monthlyDebt">Total Monthly Debt Payments</label>
          <input id="monthlyDebt" name="monthlyDebt" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="emergency">
          <label for="monthlyExpenses">Monthly Essential Expenses</label>
          <input id="monthlyExpenses" name="monthlyExpenses" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="emergency">
          <label for="emergencyMonths">Emergency Coverage (months)</label>
          <input id="emergencyMonths" name="emergencyMonths" type="number" min="1" step="1" required />
        </div>

        <div class="field-group" data-calc="savingsGoal">
          <label for="goalAmount">Goal Amount</label>
          <input id="goalAmount" name="goalAmount" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="savingsGoal">
          <label for="currentSavings">Current Savings</label>
          <input id="currentSavings" name="currentSavings" type="number" min="0" step="0.01" required />
        </div>

        <div class="field-group" data-calc="savingsGoal">
          <label for="goalYears">Time to Goal (years)</label>
          <input id="goalYears" name="goalYears" type="number" min="1" step="1" required />
        </div>

        <button type="submit">Calculate</button>
      </form>

      <section class="result" id="result" aria-live="polite">
        <h2>Result</h2>
        <div id="resultText" class="result-lines">
          <p class="result-line">Select a calculator and enter values.</p>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
